driver:
  name: vagrant

provisioner:
  name: chef_zero
  deprecations_as_errors: true
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: centos-7
  - name: oraclelinux-7
  - name: oraclelinux-8
  - name: rockylinux-8

suites:
  - name: default
    run_list:
      - recipe[test::default]
    attributes:
      mcelog:
        always_install: true
